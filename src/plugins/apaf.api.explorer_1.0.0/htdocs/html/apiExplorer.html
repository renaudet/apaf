<!doctype html>
<html>
	<head>
		<meta name="description" content="All-Purpose-Application-Framework API Explorer Page">
		<meta name="Author" lang="fr" content="Nicolas Renaudet">
		<meta name="Copyright" content="2025 Nicolas Renaudet - All rights reserved">
		<meta charset="ISO-8859-1">
		<meta http-equiv="Content-Type" content="text/html; ISO-8859-1">
		<meta http-equiv="Pragma" content="no-cache">
		<meta http-equiv="Content-Style-Type" content="text/css">
		<meta http-equiv='X-UA-Compatible' content='IE=edge'>
	    <meta name='viewport' content='width=device-width, initial-scale=1'>
		<link rel="icon" type="image/png" href="/apaf-branding/img/apaf-logo.png?version=1.0"/>
		<link href="/css/bootstrap.min.css" rel="stylesheet">
		<link href="/resources/css/apaf.css" rel="stylesheet">
		<link href="/css/treeViewer.css" rel="stylesheet">
		<link href="/apaf-api-explorer/css/apiExplorer.css" rel="stylesheet">
		<title>All Purpose Application Framework</title>
	</head>
	<body>
		<div id="navBar" class="npaUi" data-ref="menu"></div>
		<div id="card" class="npaUi" data-config="/apaf-api-explorer/json/apiExplorerCardConfig.json">
			<div class="row" style="margin-top: 5px;">
				<!-- Left column: tree + remote controls -->
				<div class="col-4 d-flex flex-column" id="apiLeftCol">
					<div id="remoteStatusBar" class="api-remote-status-bar" style="display:none;">
						<img src="/uiTools/img/silk/world_go.png">&nbsp;<span id="remoteStatusLabel"></span>
						<button id="clearRemoteBtn" type="button" class="btn btn-sm btn-outline-light float-end" style="padding: 0 6px; line-height: 1.4;"></button>
					</div>
					<div class="api-tree-toolbar">
						<button id="remoteBtn" type="button" class="btn btn-sm btn-outline-secondary"></button>
					</div>
					<div id="apiTreeArea" style="flex:1; overflow:auto;"></div>
				</div>
				<!-- Right column: API detail -->
				<div id="apiDetailArea" class="col-8" style="overflow-y:auto;">
					<div id="apiDetailPlaceholder" class="api-detail-placeholder">
						<img src="/uiTools/img/silk/world_link.png">&nbsp;
						<span id="selectApiHint"></span>
					</div>
					<div id="apiDetailContent" style="display:none;">
						<div id="apiDetailHeader" class="api-detail-header"></div>
						<div id="apiDetailDescription" class="api-detail-description"></div>
						<div class="api-detail-section-label" id="apiSecurityLabel"></div>
						<div class="api-detail-section-label" id="apiInputLabel" style="display:none;"></div>
						<pre id="apiInputContent" class="api-detail-pre" style="display:none;"></pre>
						<div class="api-detail-test-panel">
							<div class="row align-items-center" style="margin-bottom: 6px;">
								<div class="col-2 form-row-label" id="labelUri"></div>
								<div class="col-8"><input id="testUri" type="text" class="form-control form-control-sm"></div>
								<div class="col-2"><button id="testRestCallBtn" type="button" class="btn btn-sm btn-primary"></button></div>
							</div>
							<div class="row" id="payloadRow" style="display:none; margin-bottom: 6px;">
								<div class="col-2 form-row-label" id="labelPayload"></div>
								<div class="col-10"><textarea id="payload" class="form-control form-control-sm api-payload-area" rows="5"></textarea></div>
							</div>
							<div class="row">
								<div class="col-2 form-row-label">
									<span id="labelResult"></span>&nbsp;<button id="copyResultBtn" type="button" class="btn btn-sm btn-outline-secondary" title="" style="padding: 1px 4px; line-height: 1;">
										<img src="/uiTools/img/silk/page_white_copy.png" style="vertical-align: middle;">
									</button>
								</div>
								<div class="col-10 api-result-col">
									<div id="testRestCallResultArea" class="api-result-area">
										<div id="testRestCallResult" class="api-result-content"></div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Remote context modal -->
		<div id="remoteContextModal" class="api-modal-overlay" style="display:none;">
			<div class="api-modal-box">
				<div class="api-modal-header">
					<span id="remoteModalTitle"></span>
					<button type="button" class="btn-close float-end" id="remoteModalCloseBtn"></button>
				</div>
				<div class="api-modal-body">
					<div class="row mb-2">
						<label class="col-3 col-form-label col-form-label-sm" id="remoteModalHostLabel"></label>
						<div class="col-6"><input type="text" id="remoteHost" class="form-control form-control-sm" placeholder="192.168.1.10"></div>
						<div class="col-3"><input type="number" id="remotePort" class="form-control form-control-sm" placeholder="9080"></div>
					</div>
					<div class="row mb-2">
						<div class="col-3"></div>
						<div class="col-9 d-flex gap-3">
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="checkbox" id="remoteSecured">
								<label class="form-check-label" id="remoteSecuredLabel"></label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="checkbox" id="remoteAcceptCert">
								<label class="form-check-label" id="remoteAcceptCertLabel"></label>
							</div>
						</div>
					</div>
					<div class="row mb-2">
						<label class="col-3 col-form-label col-form-label-sm" id="remoteModalUserLabel"></label>
						<div class="col-9"><input type="text" id="remoteUsername" class="form-control form-control-sm"></div>
					</div>
					<div class="row mb-2">
						<label class="col-3 col-form-label col-form-label-sm" id="remoteModalPwdLabel"></label>
						<div class="col-9"><input type="password" id="remotePassword" class="form-control form-control-sm"></div>
					</div>
				</div>
				<div class="api-modal-footer">
					<button type="button" class="btn btn-sm btn-secondary" id="remoteModalCancelBtn"></button>
					<button type="button" class="btn btn-sm btn-primary" id="remoteModalConnectBtn"></button>
				</div>
			</div>
		</div>

		<div id="notifier" class="npaUi" data-ref="notifier"></div>
		<div id="monitor" class="npaUi" data-ref="sessionMonitor"></div>
		<script src="/js/jquery-3.6.3.min.js"></script>
		<script src="/js/bootstrap.bundle.min.js"></script>
		<script src="/js/treeViewer.js"></script>
		<script src="/uiTools/js/npaUiCore.js"></script>
		<script src="/resources/js/utils/apafUtils.js"></script>
		<script src="/apaf-api-explorer/js/apiExplorer.js"></script>
	</body>
</html>
